version: '3.9'

services:
  easytest:
    build: .
    container_name: easytest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - SESSION_SECRET=${SESSION_SECRET:-changeme}
    volumes:
      # Persiste banco de dados e uploads entre restarts
      - easytest_data:/app/db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  easytest_data:
    driver: local
