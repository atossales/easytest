// ── Version History ────────────────────────────────────────────────────────

var _verTestId = null, _verVarId = null;

function openVersions(testId, varId, varName) {
  _verTestId = testId; _verVarId = varId;
  document.getElementById('ver-modal-title').textContent = '📋 Versões — ' + varName;
  document.getElementById('ver-file-input').value = '';
  document.getElementById('ver-overlay').classList.add('open');
  loadVersions();
}

function closeVersions() {
  document.getElementById('ver-overlay').classList.remove('open');
}

async function loadVersions() {
  var list = document.getElementById('ver-list');
  list.innerHTML = '<div class="ins-empty">Carregando…</div>';
  try {
    var r = await fetch('/api/tests/' + _verTestId + '/variations/' + _verVarId + '/versions');
    var d = await r.json();
    if (!d.versions) { list.innerHTML = '<div class="ins-empty">Erro ao carregar versões.</div>'; return; }

    var html = '';
    // Current version
    if (d.current && d.current.file_path) {
      html += '<div class="ver-item current">' +
        '<span class="ver-num">🟢</span>' +
        '<div>' +
          '<div class="ver-name">' + esc(d.current.file_original || d.current.file_path) + '</div>' +
          '<span class="ver-tag">ATUAL</span>' +
        '</div>' +
      '</div>';
    } else {
      html += '<div class="ver-item current"><span class="ver-num">🟢</span><div><div class="ver-name">Sem arquivo (usar editor)</div><span class="ver-tag">ATUAL</span></div></div>';
    }

    if (!d.versions.length) {
      html += '<div class="ins-empty" style="margin-top:12px">Nenhuma versão arquivada ainda. Suba um novo HTML para criar o histórico.</div>';
    } else {
      html += d.versions.map(function(v) {
        var dt = v.created_at ? new Date(v.created_at).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
        return '<div class="ver-item">' +
          '<span class="ver-num">v' + v.version_number + '</span>' +
          '<div style="flex:1">' +
            '<div class="ver-name">' + esc(v.file_original || v.file_path) + (v.label ? ' — ' + esc(v.label) : '') + '</div>' +
            '<div class="ver-date">' + dt + '</div>' +
          '</div>' +
          '<div class="ver-acts">' +
            '<button class="btn bsm bs" onclick="restoreVersion(' + v.id + ')">↩ Restaurar</button>' +
            '<button class="btn bsm bs" style="color:#EF4444;border-color:#FCA5A5" onclick="deleteVersion(' + v.id + ')">🗑</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }
    list.innerHTML = html;
  } catch(e) {
    list.innerHTML = '<div class="ins-empty">Erro: ' + e.message + '</div>';
  }
}

async function uploadNewVersion() {
  var file = document.getElementById('ver-file-input').files[0];
  if (!file) { alert('Selecione um arquivo HTML primeiro.'); return; }
  var btn = document.querySelector('.vm-up-btn');
  btn.disabled = true; btn.textContent = 'Enviando…';
  var fd = new FormData();
  fd.append('page', file);
  try {
    var r = await fetch('/api/tests/' + _verTestId + '/variations/' + _verVarId + '/html', { method: 'POST', body: fd });
    var d = await r.json();
    if (!d.success) throw new Error(d.error || 'Erro');
    document.getElementById('ver-file-input').value = '';
    loadVersions();
    rRpt(_verTestId); // refresh report
  } catch(e) {
    alert('Erro ao enviar: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Enviar nova versão';
  }
}

async function restoreVersion(versionId) {
  if (!confirm('Restaurar esta versão? A atual será arquivada automaticamente.')) return;
  try {
    var r = await fetch('/api/tests/' + _verTestId + '/variations/' + _verVarId + '/versions/restore/' + versionId, { method: 'POST' });
    var d = await r.json();
    if (!d.success) throw new Error(d.error || 'Erro');
    loadVersions();
    rRpt(_verTestId);
  } catch(e) {
    alert('Erro ao restaurar: ' + e.message);
  }
}

async function deleteVersion(versionId) {
  if (!confirm('Excluir permanentemente esta versão? Esta ação não pode ser desfeita.')) return;
  try {
    var r = await fetch('/api/tests/' + _verTestId + '/variations/' + _verVarId + '/versions/' + versionId, { method: 'DELETE' });
    var d = await r.json();
    if (!d.success) throw new Error(d.error || 'Erro');
    loadVersions();
  } catch(e) {
    alert('Erro ao excluir: ' + e.message);
  }
}

async function loadInsight(testId) {
  try {
    const d = await api('/api/ai/insights/' + testId);
    _renderInsight(d);
  } catch(e) {
    const body = document.getElementById('ins-body');
    if (body) body.innerHTML = '<div class="ins-empty">Não foi possível carregar o insight.</div>';
  }
}

async function refreshInsight(testId) {
  const btn  = document.getElementById('ins-refresh-btn');
  const body = document.getElementById('ins-body');
  const meta = document.getElementById('ins-meta');
  if (!body) return;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Analisando...'; }
  if (meta) meta.textContent = '';
  body.innerHTML = '<div style="display:flex;align-items:center;gap:10px;color:var(--g5);font-size:12px"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span>Gemini analisando seus dados de conversão...</span></div>';
  try {
    const d = await api('/api/ai/insights/' + testId + '/refresh', { method: 'POST', body: {} });
    _renderInsight(d);
  } catch(e) {
    body.innerHTML = '<div class="ins-empty">⚠️ ' + esc(e.message || 'Erro ao gerar insight') + '</div>';
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔄 Gerar agora'; }
  }
}

function _renderInsight(d) {
  const body = document.getElementById('ins-body');
  const meta = document.getElementById('ins-meta');
  if (!body) return;

  if (!d.insight) {
    body.innerHTML = '<div class="ins-empty">Ainda não há análise para este teste. Clique em "Gerar agora" para criar o primeiro insight, ou aguarde o agente rodar automaticamente.</div>';
    return;
  }

  // Formata o texto: emojis como separadores visuais de seção
  var html = esc(d.insight)
    .replace(/\n/g, '<br>')
    .replace(/(📊|🏆|⚠️|🚀)/g, '<br><strong style="font-size:12px;color:var(--bk)">$1</strong>');

  // Snapshot de dados na época da geração
  var snapHtml = '';
  if (d.views_snap !== undefined) {
    snapHtml = '<div class="ins-snap">' +
      '<div class="ins-snap-item"><div class="ins-snap-lbl">Visitas</div><div class="ins-snap-val">' + N(d.views_snap) + '</div></div>' +
      '<div class="ins-snap-item"><div class="ins-snap-lbl">Conversões</div><div class="ins-snap-val" style="color:var(--gn)">' + N(d.conv_snap) + '</div></div>' +
      '<div class="ins-snap-item"><div class="ins-snap-lbl">Taxa CR</div><div class="ins-snap-val" style="color:var(--b)">' + d.cr_snap + '%</div></div>' +
    '</div>';
  }

  body.innerHTML = '<div class="ins-body">' + html + '</div>' + snapHtml;

  if (meta && d.generated_at) {
    var ago = _timeAgo(new Date(d.generated_at));
    meta.textContent = 'gerado ' + ago;
  }
}

function _timeAgo(date) {
  var diff = Math.floor((Date.now() - date.getTime()) / 1000);
  if (diff < 60)  return 'agora mesmo';
  if (diff < 3600) return 'há ' + Math.floor(diff / 60) + 'min';
  if (diff < 86400) return 'há ' + Math.floor(diff / 3600) + 'h';
  return 'há ' + Math.floor(diff / 86400) + ' dias';
}

async function rMobileTests(filter) {
  const ts = await api('/api/tests');
  const q  = (filter || '').toLowerCase();
  const filtered = q ? ts.filter(function(t) { return t.name.toLowerCase().includes(q); }) : ts;

  // Sort options — always active first within each sort
  const sort = document.getElementById('mob-sort') ? document.getElementById('mob-sort').value : 'cr';
  filtered.sort(function(a, b) {
    if (a.active !== b.active) return b.active - a.active;
    if (sort === 'cr') return (b.total_views > 0 ? b.total_conversions/b.total_views : 0) - (a.total_views > 0 ? a.total_conversions/a.total_views : 0);
    if (sort === 'views') return b.total_views - a.total_views;
    if (sort === 'conv') return b.total_conversions - a.total_conversions;
    return new Date(b.created_at) - new Date(a.created_at);
  });

  const cards = filtered.map(function(t) {
    const cr = t.total_views > 0 ? (t.total_conversions / t.total_views * 100).toFixed(1) : '0.0';
    return '<div class="tc" onclick="go(\'report\',' + t.id + ')">' +
      '<div class="tc-top">' +
      '<div class="tc-name">' + esc(t.name) + '</div>' +
      '<span class="badge ' + (t.active ? 'b-on' : (t.auto_paused ? 'b-guard' : 'b-off')) + '">' + (t.active ? 'Ativo' : (t.auto_paused ? '⏸ Guard' : 'Off')) + '</span>' +
      '</div>' +
      '<div class="tc-stats">' +
      '<div class="tc-stat"><div class="tsl">Views</div><div class="tsv">' + N(t.total_views) + '</div></div>' +
      '<div class="tc-stat"><div class="tsl">Conv</div><div class="tsv" style="color:var(--gn)">' + N(t.total_conversions) + '</div></div>' +
      '<div class="tc-stat"><div class="tsl">Taxa</div><div class="tsv" style="color:var(--b)">' + cr + '%</div></div>' +
      '</div>' +
      '<div class="tc-acts">' +
      '<button class="btn bs bsm" style="flex:1" onclick="event.stopPropagation();go(\'report\',' + t.id + ')">Ver relatório</button>' +
      '</div></div>';
  }).join('') || '<div style="padding:30px;text-align:center;color:var(--g3);font-size:12px">Nenhum teste encontrado</div>';

  const wrap = document.getElementById('mob-list');
  if (wrap) { wrap.innerHTML = cards; return; }

  document.getElementById('m').innerHTML =
    '<div class="ph"><div><h1>Meus Testes</h1><div class="sub">' + ts.length + ' teste' + (ts.length !== 1 ? 's' : '') + '</div></div>' +
    '<button class="btn bp" onclick="go(\'new\')">+ Novo</button></div>' +
    '<div style="display:flex;gap:8px;margin-bottom:14px">' +
    '<input class="fc" id="mob-q" placeholder="Buscar teste..." oninput="rMobileTests(this.value)" style="flex:1">' +
    '<select class="rs" id="mob-sort" onchange="rMobileTests(document.getElementById(\'mob-q\').value)">' +
    '<option value="cr">Taxa CR</option>' +
    '<option value="views">Views</option>' +
    '<option value="conv">Conversões</option>' +
    '<option value="date">Recentes</option>' +
    '</select></div>' +
    '<div class="tc-list" id="mob-list">' + cards + '</div>';
}

async function saveEdit(id) {
  const name = document.getElementById('e-name').value.trim();
  if (!name) { toast('Nome obrigatório', true); return; }
  const btn = document.getElementById('save-btn');
  btn.textContent = 'Salvando...'; btn.disabled = true;

  const selectedEvents = Array.from(document.querySelectorAll('#e-mpx-events input[name="pixel_event"]:checked')).map(function(el) { return el.value; });

  const data = {
    name,
    test_uri:             document.getElementById('e-uri').value.trim(),
    active:               +document.getElementById('e-active').value,
    ga4_measurement_id:   document.getElementById('e-ga4').value.trim() || null,
    ga4_api_secret:       document.getElementById('e-gas').value.trim() || null,
    meta_pixel_id:        document.getElementById('e-mpx').value.trim() || null,
    meta_pixel_events:    selectedEvents.length ? JSON.stringify(selectedEvents) : null,
    conversion_page_url:  document.getElementById('e-cv').value.trim() || null,
    custom_domain:        document.getElementById('e-cd').value.trim() || null,
    head_snippet:         document.getElementById('e-hs').value.trim() || null,
    body_snippet:         document.getElementById('e-bs').value.trim() || null,
    funnel_steps:         (function() {
      var steps = [];
      var f0 = document.getElementById('e-f0'); if (f0 && f0.value.trim()) steps.push({ name: 'Cadastros', url: f0.value.trim() });
      var f1 = document.getElementById('e-f1'); if (f1 && f1.value.trim()) steps.push({ name: 'Initiate Checkout', url: f1.value.trim() });
      return steps;
    })(),
  };

  const r = await api('/api/tests/' + id, { method: 'PUT', body: data });
  if (r.error) { toast('Erro: ' + r.error, true); btn.textContent = '💾 Salvar'; btn.disabled = false; return; }
  toast('Teste salvo!');
  go('report', id);
}

function buildFunnelStepsHtml(steps) {
  if (!steps || !steps.length) return '<div style="color:#888;font-size:11px;padding:4px 0">Nenhuma etapa configurada.</div>';
  return steps.map(function(s, i) {
    return '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px" id="fstep-' + i + '">' +
      '<input class="fc" style="flex:1" placeholder="Nome da etapa (ex: Checkout)" value="' + esc(s.name || '') + '" data-fi="name" data-idx="' + i + '">' +
      '<input class="fc" style="flex:2" placeholder="URL (ex: https://site.com/checkout)" value="' + esc(s.url || '') + '" data-fi="url" data-idx="' + i + '">' +
      '<button class="btn br bsm" onclick="removeFunnelStep(' + i + ')">✕</button>' +
      '</div>';
  }).join('');
}

function getFunnelSteps() {
  var steps = [];
  document.querySelectorAll('#e-funnel-steps [data-fi="name"]').forEach(function(inp) {
    var idx = inp.dataset.idx;
    var urlEl = document.querySelector('#e-funnel-steps [data-fi="url"][data-idx="' + idx + '"]');
    var name = inp.value.trim(), url = urlEl ? urlEl.value.trim() : '';
    if (name && url) steps.push({ name: name, url: url });
  });
  return steps;
}

function addFunnelStep() {
  var steps = getFunnelSteps();
  steps.push({ name: '', url: '' });
  document.getElementById('e-funnel-steps').innerHTML = buildFunnelStepsHtml(steps);
  // Re-index data-idx after rebuild
  document.querySelectorAll('#e-funnel-steps [data-fi="name"]').forEach(function(inp, i) { inp.dataset.idx = i; });
  document.querySelectorAll('#e-funnel-steps [data-fi="url"]').forEach(function(inp, i) { inp.dataset.idx = i; });
}

function removeFunnelStep(idx) {
  var steps = getFunnelSteps();
  // Remove by current DOM order (idx may shift after reads)
  var nameEls = Array.from(document.querySelectorAll('#e-funnel-steps [data-fi="name"]'));
  var urlEls  = Array.from(document.querySelectorAll('#e-funnel-steps [data-fi="url"]'));
  var fresh = nameEls.map(function(el, i) { return { name: el.value.trim(), url: urlEls[i] ? urlEls[i].value.trim() : '' }; });
  fresh.splice(idx, 1);
  document.getElementById('e-funnel-steps').innerHTML = buildFunnelStepsHtml(fresh);
  document.querySelectorAll('#e-funnel-steps [data-fi="name"]').forEach(function(inp, i) { inp.dataset.idx = i; });
  document.querySelectorAll('#e-funnel-steps [data-fi="url"]').forEach(function(inp, i) { inp.dataset.idx = i; });
}

async function setPct(testId, varId) {
  const input = document.getElementById('vpct-' + varId);
  const pct = Math.max(1, Math.min(100, parseInt(input?.value) || 50));
  input.value = pct;
  const r = await api('/api/tests/' + testId + '/variations/' + varId, { method: 'PUT', body: { percentage: pct } });
  if (r.error) toast('Erro: ' + r.error, true);
  else toast('Tráfego atualizado para ' + pct + '%');
}

async function toggleVar(testId, varId, newActive) {
  const r = await api('/api/tests/' + testId + '/variations/' + varId, { method: 'PUT', body: { active: newActive } });
  if (r.error) { toast('Erro: ' + r.error, true); return; }
  const btn = document.getElementById('vtoggle-' + varId);
  if (btn) {
    btn.textContent = newActive ? '● Ativo' : '○ Pausado';
    btn.style.background = newActive ? '#E8F5E9' : '#FFF3E0';
    btn.style.color = newActive ? '#2E7D32' : '#E65100';
    btn.onclick = function() { toggleVar(testId, varId, newActive ? 0 : 1); };
  }
  toast(newActive ? 'Variação ativada' : 'Variação pausada');
}

async function renameVar(testId, varId) {
  const input = document.getElementById('vname-' + varId);
  const name = input ? input.value.trim() : '';
  if (!name) { toast('Nome não pode ser vazio', true); return; }
  const r = await api('/api/tests/' + testId + '/variations/' + varId, { method: 'PUT', body: { name } });
  if (r.error) toast('Erro: ' + r.error, true);
  else toast('Nome atualizado!');
}

async function replaceHtml(testId, varId, input) {
  const file = input.files[0];
  if (!file) return;
  const label = input.parentElement;
  const orig = label.textContent.trim();
  label.textContent = 'Enviando...';
  const fd = new FormData();
  fd.append('page', file);
  try {
    const r = await fetch('/api/tests/' + testId + '/variations/' + varId + '/html', { method: 'POST', body: fd });
    const d = await r.json();
    if (d.error) { toast('Erro: ' + d.error, true); }
    else { toast('HTML atualizado: ' + (d.variation.name || file.name)); }
  } catch(e) { toast('Erro ao enviar arquivo', true); }
  label.textContent = orig;
  input.value = '';
}

var _lastAiAnalysisText = null;

async function runAiAnalysisPage() {
  const sel  = document.getElementById('ai-test-sel');
  const days = document.getElementById('ai-days-val');
  const out  = document.getElementById('ai-page-out');
  const waBtn = document.getElementById('ai-wa-btn');
  if (!sel || !out) return;
  const testId = sel.value, range = days ? days.value : '7';
  _lastAiAnalysisText = null;
  if (waBtn) waBtn.style.display = 'none';
  out.innerHTML = '<div class="ai-loading"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span>Analisando com Gemini Flash...</span></div>';
  try {
    const d = await api('/api/ai/analyze/' + testId + '?range=' + range);
    if (d.error) { out.innerHTML = '<div style="color:#FF6B6B;font-size:12px">⚠️ ' + esc(d.error) + '</div>'; return; }
    _lastAiAnalysisText = d.analysis;
    const html = d.analysis
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^#{1,6}\s+(.+)$/gm, '<strong style="font-size:13px;color:#fff;display:block;margin-top:12px;margin-bottom:4px">$1</strong>')
      .replace(/\n/g, '<br>');
    out.innerHTML = '<div class="ai-out">' + html + '</div>' +
      '<div style="font-size:9px;color:#666;margin-top:8px">Gerado em ' + new Date(d.generated_at).toLocaleString('pt-BR') + (d.has_clarity ? ' · com dados Clarity' : '') + '</div>';
    if (waBtn) waBtn.style.display = '';
  } catch(e) {
    out.innerHTML = '<div style="color:#FF6B6B;font-size:12px">⚠️ Erro: ' + e.message + '</div>';
  }
}

function periodLabel(v) {
  if (v === 'yesterday') return 'ontem';
  var n = parseInt(v);
  return n === 1 ? 'hoje' : 'últimos ' + n + ' dias';
}

async function sendAiReportWA() {
  if (!_lastAiAnalysisText) { toast('Gere a análise primeiro antes de enviar.', true); return; }
  if (!confirm('Enviar a análise IA via WhatsApp para todos os números configurados?')) return;
  var r = await api('/api/whatsapp/send-text', { method: 'POST', body: { text: _lastAiAnalysisText } });
  if (r.ok) toast('Análise enviada via WhatsApp!');
  else toast('Erro ao enviar: ' + (r.error || 'falha'), true);
}

// ══════════════════════════════════════════════════
//  CODE EDITOR (Monaco + Live Preview)
// ══════════════════════════════════════════════════
var _editorTestId    = null;
var _editorVarId     = null;
var _monacoInstance  = null;
var _previewDebounce = null;
var _editorDevice    = 'desktop';

// Widths for device preview
var _deviceWidths = { desktop: '100%', tablet: '768px', mobile: '390px' };

// Configure Monaco loader to use CDN
require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.47.0/min/vs' } });

function openEditorFromBtn(btn) {
  openEditor(
    Number(btn.getAttribute('data-edit-test')),
    Number(btn.getAttribute('data-edit-var')),
    btn.getAttribute('data-edit-name')
  );
}

async function openEditor(testId, varId, varName) {
  _editorTestId = testId;
  _editorVarId  = varId;

  document.getElementById('editor-title').innerHTML =
    'Editor de Código <span class="et-sub">— ' + esc(varName || 'Variação') + '</span>';
  var saveBtn = document.getElementById('editor-save-btn');
  saveBtn.textContent = '💾 Salvar alterações';
  saveBtn.className = 'et-btn et-save';
  document.getElementById('editor-overlay').classList.add('open');

  // Fetch HTML
  var data;
  try {
    data = await api('/api/tests/' + testId + '/variations/' + varId + '/html-content');
  } catch (e) {
    toast('Erro ao carregar HTML: ' + e.message, true);
    document.getElementById('editor-overlay').classList.remove('open');
    return;
  }

  // Update preview immediately with the loaded HTML
  _updatePreview(data.html);

  // Init or update Monaco editor
  require(['vs/editor/editor.main'], function() {
    var container = document.getElementById('monaco-container');
    if (_monacoInstance) {
      _monacoInstance.setValue(data.html);
      _monacoInstance.setScrollPosition({ scrollTop: 0 });
    } else {
      _monacoInstance = monaco.editor.create(container, {
        value: data.html,
        language: 'html',
        theme: 'vs-dark',
        fontSize: 13,
        lineHeight: 20,
        wordWrap: 'on',
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        automaticLayout: true,
        tabSize: 2,
        formatOnPaste: false,
        renderLineHighlight: 'line',
        smoothScrolling: true,
        cursorSmoothCaretAnimation: 'on',
        padding: { top: 12, bottom: 12 },
      });

      // Live preview — debounced 600ms after last keystroke
      _monacoInstance.onDidChangeModelContent(function() {
        clearTimeout(_previewDebounce);
        _previewDebounce = setTimeout(function() {
          _updatePreview(_monacoInstance.getValue());
        }, 600);
      });
    }
  });
}

function _updatePreview(html) {
  var frame = document.getElementById('editor-frame');
  if (!frame) return;

  // Apply device width
  var w = _deviceWidths[_editorDevice] || '100%';
  frame.style.width  = w;
  frame.style.maxWidth = w;

  // Use srcdoc for preview — preview doesn't need same-origin access
  frame.srcdoc = html;

  // Show "Atualizado" indicator briefly
  var status = document.getElementById('ep-status');
  if (status) {
    status.classList.add('show');
    clearTimeout(status._t);
    status._t = setTimeout(function() { status.classList.remove('show'); }, 1200);
  }
}

function editorDevice(mode) {
  _editorDevice = mode;
  ['desktop','tablet','mobile'].forEach(function(m) {
    var btn = document.getElementById('edev-' + m);
    if (btn) btn.classList.toggle('active', m === mode);
  });
  // Re-apply current HTML to update preview width
  if (_monacoInstance) _updatePreview(_monacoInstance.getValue());
}

function closeEditor() {
  clearTimeout(_previewDebounce);
  if (_monacoInstance) {
    _monacoInstance.dispose();
    _monacoInstance = null;
  }
  var frame = document.getElementById('editor-frame');
  if (frame) frame.srcdoc = '';
  document.getElementById('editor-overlay').classList.remove('open');
  _editorDevice = 'desktop';
  ['desktop','tablet','mobile'].forEach(function(m) {
    var btn = document.getElementById('edev-' + m);
    if (btn) btn.classList.toggle('active', m === 'desktop');
  });
}

async function saveEditor() {
  if (!_monacoInstance) return;
  var btn = document.getElementById('editor-save-btn');
  btn.textContent = '⏳ Salvando...';
  btn.className = 'et-btn et-saving';

  var html = _monacoInstance.getValue();

  try {
    await api('/api/tests/' + _editorTestId + '/variations/' + _editorVarId + '/html-content', {
      method: 'PUT',
      body: { html: html },
    });
    btn.textContent = '✅ Salvo!';
    btn.className = 'et-btn et-save';
    toast('Variação salva com sucesso!');
    setTimeout(function() { btn.textContent = '💾 Salvar alterações'; }, 2000);
  } catch (e) {
    btn.textContent = '💾 Salvar alterações';
    btn.className = 'et-btn et-save';
    toast('Erro ao salvar: ' + e.message, true);
  }
}
